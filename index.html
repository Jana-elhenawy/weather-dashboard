<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="cloudy">

  <div class="app-wrapper">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">☁</span>
        <span class="brand-name">WeatherDash</span>
      </div>

      <div class="search-box">
        <input id="city-input" type="text" placeholder="Search city…" autocomplete="off"/>
        <button id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      <div class="unit-toggle">
        <button id="metric-btn" class="unit-btn active">°C</button>
        <button id="imperial-btn" class="unit-btn">°F</button>
      </div>

      <!-- Current weather card -->
      <div class="current-card" id="current-card">
        <div class="current-icon" id="current-icon">☀️</div>
        <div class="current-temp" id="current-temp">--°</div>
        <div class="current-city" id="current-city">--</div>
        <div class="current-desc" id="current-desc">--</div>
        <div class="current-date" id="current-date">--</div>
      </div>

      <div class="sidebar-stats">
        <div class="stat">
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">--%</span>
        </div>
        <div class="stat">
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind">-- km/h</span>
        </div>
        <div class="stat">
          <span class="stat-label">Feels like</span>
          <span class="stat-value" id="feels-like">--°</span>
        </div>
        <div class="stat">
          <span class="stat-label">Visibility</span>
          <span class="stat-value" id="visibility">-- km</span>
        </div>
      </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="main">
      <header class="main-header">
        <h1>5-Day Forecast</h1>
        <span id="header-city" class="header-city"></span>
      </header>

      <div class="forecast-grid" id="forecast-grid">
        <!-- Forecast cards injected by JS -->
      </div>

      <!-- Hourly bar -->
      <section class="hourly-section">
        <h2>Today's Hourly</h2>
        <div class="hourly-strip" id="hourly-strip">
          <!-- Hourly slots injected by JS -->
        </div>
      </section>

      <!-- Detail cards -->
      <section class="detail-grid">
        <div class="detail-card">
          <div class="detail-label">Sunrise</div>
          <div class="detail-value" id="sunrise">--:--</div>
          <div class="detail-sub">🌅</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Sunset</div>
          <div class="detail-value" id="sunset">--:--</div>
          <div class="detail-sub">🌇</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Pressure</div>
          <div class="detail-value" id="pressure">-- hPa</div>
          <div class="detail-sub">🌡</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Cloudiness</div>
          <div class="detail-value" id="cloudiness">--%</div>
          <div class="detail-sub">☁</div>
        </div>
      </section>

      <p class="attribution">Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a></p>
    </main>
  </div>

  <div id="error-toast" class="toast hidden">City not found. Please try again.</div>
  <div id="loading" class="loading-overlay hidden"><div class="spinner"></div></div>

  <script src="app.js"></script>
</body>
</html>
